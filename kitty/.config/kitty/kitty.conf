# Set the terminal type
cursor_shape block
enable_audio_bell no

# Colors configuration
bold_brightens_ansi yes
shell_integration no-cursor  # guarantees that the cursor will be a clock

# Fonts
font_family family="JetBrainsMono Nerd Font Mono"
bold_font auto
italic_font auto
bold_italic_font auto
font_size 9.0

# Primary colors
foreground #ffffff
background #1e1e1e

# Normal colors
color0  #171421
color1  #FF3242
color2  #76E85E
color3  #FAB648
color4  #338F86
color5  #9D66F6
color6  #23D7D7
color7  #FFFFFF

# Bright colors
color8  #8A898E
color9  #FF5555
color10 #86FF75
color11 #F7D07F
color12 #23D7D7
color13 #C48DFF
color14 #00EDE1
color15 #FFFFFF
