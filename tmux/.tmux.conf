set -g prefix C-a
unbind C-b
bind C-a send-prefix
bind a send-prefix
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 0

set -g status-bg colour235
set -g status-fg colour250
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g status-justify left
set -g status-left "#[fg=colour16,bg=colour148,bold] #S #[fg=colour148,bg=colour235,nobold]"
set -g status-right "#[fg=colour235,bg=colour235]#[fg=colour250,bg=colour235] %H:%M %d/%m/%y #[fg=colour235,bg=colour235]"
set -wg window-status-format " #I:#W "
set -wg window-status-current-format "#[fg=colour16,bg=colour81,bold] #I:#W "
set -wg window-status-current-style "fg=colour16,bg=colour81,bold"
set -wg window-status-style "fg=colour250,bg=colour237"
set -wg window-status-separator ""
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour81"
set -g message-style "fg=colour16,bg=colour148"
set -g message-command-style "fg=colour81,bg=colour235"

bind -n M-n next-window
bind -n M-p previous-window
bind -n M-h copy-mode \; send-keys -X page-up
bind -n M-l copy-mode \; send-keys -X page-down
bind -n M-j copy-mode \; send-keys -X halfpage-down
bind -n M-k copy-mode \; send-keys -X halfpage-up
bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-\\ select-pane -l
bind \\ split-window -h -c "#{pane_current_path}"
